<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Eljan Guluyev's Blog - Essays on technology, startups, and innovation.">
    <meta name="keywords" content="Eljan Guluyev, Blog, Essays, Technology, Startups, AI">
    <meta name="author" content="Eljan Guluyev">
    <title>Eljan Guluyev | Blog</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: 'Courier New', Courier, monospace;
            background-color: #0d1117;
            color: #c9d1d9;
            box-sizing: border-box;
        }

        a {
            color: #58a6ff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .blog-container {
            max-width: 850px;
            margin: 0 auto;
        }

        .back-to-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
        }

        .blog-header {
            margin-bottom: 35px;
        }

        .blog-header h1 {
            margin-bottom: 10px;
            color: #f0f6fc;
        }

        .blog-post {
            background-color: #161b22;
            padding: 24px;
            border: 1px solid #30363d;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .blog-post h2 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #f0f6fc;
        }

        .blog-meta {
            color: #8b949e;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .blog-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        .blog-tag {
            background-color: #1f2937;
            color: #58a6ff;
            border-radius: 999px;
            padding: 4px 12px;
            font-size: 0.8rem;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8b949e;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 600px) {
            body {
                padding: 20px;
            }

            .blog-post {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="blog-container">
        <a href="index.html" class="back-to-home"><i class="fas fa-arrow-left"></i> Back to Home</a>

        <header class="blog-header">
            <h1>Blog & Essays</h1>
            <p>I publish essays here about AI, startup lessons, and building products with purpose.</p>
        </header>

        <div class="empty-state">
            <i class="fas fa-pen-fancy"></i>
            <p>Essays coming soon...</p>
        </div>
    </div>
</body>
</html>
